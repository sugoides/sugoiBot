<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugoiBot Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #2c2f33; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background-color: #23272a; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #7289da; }
        .stats { display: flex; gap: 2rem; margin-top: 1rem; }
        .stat-item { flex: 1; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #99aab5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SugoiBot Dashboard</h1>
        <p>Welcome to the basic SugoiBot status page.</p>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="guilds">?</div>
                <div>Guilds</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="users">?</div>
                <div>Tracked Users</div>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('guilds').textContent = data.guildCount || 0;
                document.getElementById('users').textContent = data.userCount || 0;
            });
    </script>
</body>
</html>
